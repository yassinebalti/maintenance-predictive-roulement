# /etc/grafana/provisioning/dashboards/maintenance.yml
apiVersion: 1
providers:
  - name: 'Maintenance Prédictive'
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: true
